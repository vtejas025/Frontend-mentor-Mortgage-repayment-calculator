<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Age calculator app</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <main>

    <form novalidate>

      <fieldset class="parent">

        <legend> Birthday details</legend>

        <div class="wrapper">

          <label for="day">
            DAY
          </label>

          <input type="number" required step="1" min="1" max="31" placeholder="DD" id="day">

          <span class="errorMessage">This field is required</span>

        </div>
        
        <div class="wrapper">

          <label for="month">        
            MONTH
          </label>

          <input type="number" required step="1" min="1" max="12" placeholder="MM" id="month" name="birth-month">

          <span class="errorMessage">This field is required</span>

        </div>

        <div class="wrapper">

          <label for="year">  
            YEAR
          </label>
          
          <input type="number" required step="1" min="0" max="9999" placeholder="YYYY" id="year" name="birth-year">

          <span class="errorMessage">This field is required</span>

        </div>
      
      </fieldset>

      <button type="submit" aria-label="Birthday details">

        <svg xmlns="http://www.w3.org/2000/svg" width="46" height="44" viewBox="0 0 46 44" aria-hidden="true" focusable="false"><g fill="none" stroke="#FFF" stroke-width="2"><path d="M1 22.019C8.333 21.686 23 25.616 23 44M23 44V0M45 22.019C37.667 21.686 23 25.616 23 44"/></g></svg>

      </button>

      <hr>

      <span class="age">

        <output id="years" name="years" for="year" class="common">--</output>

        <span>years</span>

      </span>

      <span class="age">

        <output id="months" name="months" for="month" class="common">--</output>

        <span>months</span>

      </span>

      <span class="age">

        <output id="days" name="days" for="day" class="common">--</output>

        <span>days</span>

      </span>

    </form>
    
  </main>
  
<script src="code.js"></script>
</body>
</html>
